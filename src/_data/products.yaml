    name: 蒜山ジャージーチーズケーキ
    category: チーズケーキ
    variant:
      - piece: 12
        unit: cm
        price: 700
    description: >
      新鮮な蒜山ジャージー牛乳とたっぷりクリーミーなチーズでつくったチーズケーキです。
    image: "assets/img/butterCake.jpg"
  - id: chocoCake
    name: チョコレートケーキ
    category: チーズケーキ
