        unit: cm
        price: 700
    description: >
      ホワイトチョコレートとバンホーテンココアを使用したショコラケーキです。
    image: "assets/img/chocoCake.jpg"
  - id: manju
    name: ヒルゼン高原まんじゅう
    category: 和菓子
    variant:
      - piece: 10
        unit: 個入
        price: 1500
      - piece: 15
        unit: 個入
        price: 2250
    description: >
      新田菓子舗を代表する和菓子がこの「ヒルゼン高原まんじゅう」です。蒜山高原センターでは毎日、お客様を前にしての実演販売も行なっています。菓子につかう、こしあんとジャージー牛乳カステラとの絶妙な組み合わせ！保存剤など一切使っておりません。
    image: "assets/img/manju.jpg"
  - id: souffle
    name: 蒜山スフレチーズケーキ
    category: チーズケーキ
    variant:
      - piece: "5.5"
        unit: 号
        price: 1700
    description: >
      3種類のたっぷりのクリームチーズと蒜山高原特産のジャージー牛乳を使って、じっくりと焼き上げて作った手作りのチーズケーキです。
      この商品は手作りの限定の商品の為、選ばれた販売店でしか販売していません。
    image: "assets/img/souffle.jpg"
  - id: hachimitsu
    name: 黄金はちみつケーキ
    category: 洋菓子
    variant:
      - piece: 18
        unit: cm
        price: 1460
    description: >
      新鮮なたまごと蜂蜜を練り込んだ生地に、焼成後にもはちみつを塗り込んで作ったしっとりケーキです。
    image: "assets/img/hachimitsu.jpg"
  - id: yukino
    name: 雪乃ロール
    category: 洋菓子
    variant:
      - piece: 1
        unit: 本
        price: 1800
    description: >
      卵黄ひかえめの生地にたっぷりの生クリームをサンドしたロールケーキ｡蒜山高原SA下り線限定商品です｡
    image: "assets/img/yukino.jpg"
